<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRVTBot Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: #fff; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); }
    h1 { font-size: 2.5em; margin-bottom: 10px; }
    .subtitle { color: rgba(255,255,255,0.7); font-size: 1.1em; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 20px; }
    .card h3 { font-size: 0.9em; color: rgba(255,255,255,0.6); margin-bottom: 10px; text-transform: uppercase; }
    .card .value { font-size: 2em; font-weight: bold; color: #4ade80; }
    .section { margin-bottom: 40px; }
    .section h2 { font-size: 1.5em; margin-bottom: 20px; }
    .grid-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.85em; background: rgba(74,222,128,0.2); color: #4ade80; }
    button { background: rgba(59,130,246,0.8); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 10px 10px 0 0; }
    button:hover { background: rgba(59,130,246,1); }
    .loading { color: rgba(255,255,255,0.6); font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 GRVTBot</h1>
      <p class="subtitle">Grid Trading Bot para GRVT</p>
    </header>

    <div class="cards">
      <div class="card">
        <h3>Estado</h3>
        <div class="value">✅ Activo</div>
      </div>
      <div class="card">
        <h3>Grids Activos</h3>
        <div class="value" id="activeGrids">0</div>
      </div>
      <div class="card">
        <h3>Fills Totales</h3>
        <div class="value" id="totalFills">0</div>
      </div>
      <div class="card">
        <h3>PnL Total</h3>
        <div class="value" id="totalPnL">$0.00</div>
      </div>
    </div>

    <div class="section">
      <h2>📊 Grids Activos</h2>
      <div id="gridsList">
        <div class="loading">Cargando grids...</div>
      </div>
    </div>

    <div class="section">
      <h2>⚙️ Controles</h2>
      <button onclick="loadData()">🔄 Actualizar</button>
      <button onclick="window.location.href='/api/status'">📡 API Status</button>
      <button onclick="window.location.href='/api/grids'">📊 Grids JSON</button>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const statusRes = await fetch('/api/status');
        const gridsRes = await fetch('/api/grids');

        if (!statusRes.ok || !gridsRes.ok) throw new Error('Error cargando datos');

        const status = await statusRes.json();
        const grids = await gridsRes.json();

        document.getElementById('activeGrids').textContent = status.activeGrids || 0;
        document.getElementById('totalFills').textContent = status.totalFills || 0;
        document.getElementById('totalPnL').textContent = '$' + ((status.totalPnL || 0).toFixed(2));

        const container = document.getElementById('gridsList');
        if (!grids || grids.length === 0) {
          container.innerHTML = '<div class="loading">No hay grids activos</div>';
        } else {
          container.innerHTML = grids.map(g => `
            <div class="grid-item">
              <div><strong>${g.instrument}</strong></div>
              <span class="badge">${g.status}</span>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    loadData();
    setInterval(loadData, 5000);
  </script>
</body>
</html>
