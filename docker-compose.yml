version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grvtbot-custom
    restart: unless-stopped
    ports:
      - "${BOT_PORT:-3848}:3848"
    environment:
      - NODE_ENV=production
      - GRVT_API_KEY=${GRVT_API_KEY}
      - GRVT_API_SECRET=${GRVT_API_SECRET}
      - GRVT_TRADING_ACCOUNT_ID=${GRVT_TRADING_ACCOUNT_ID}
      - GRVT_TRADING_ADDRESS=${GRVT_TRADING_ADDRESS}
      - JWT_SECRET=${JWT_SECRET}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY}
      - BOT_PORT=${BOT_PORT:-3848}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - grvtbot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3848/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  grvtbot-network:
    driver: bridge
