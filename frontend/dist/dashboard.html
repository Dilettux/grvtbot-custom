<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRVTBot Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1em;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .card h3 {
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card .value {
      font-size: 2em;
      font-weight: bold;
      color: #4ade80;
    }

    .card.warning .value {
      color: #fbbf24;
    }

    .card.error .value {
      color: #f87171;
    }

    .section {
      margin-bottom: 40px;
    }

    .section h2 {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.9);
    }

    .grids-list {
      display: grid;
      gap: 15px;
    }

    .grid-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .grid-info {
      flex: 1;
    }

    .grid-name {
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 5px;
    }

    .grid-details {
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.6);
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .badge.active {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }

    .badge.inactive {
      background: rgba(156, 163, 175, 0.2);
      color: #d1d5db;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      background: rgba(59, 130, 246, 0.8);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95em;
      transition: all 0.3s;
    }

    button:hover {
      background: rgba(59, 130, 246, 1);
      transform: translateY(-2px);
    }

    .loading {
      color: rgba(255, 255, 255, 0.6);
      font-style: italic;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 GRVTBot</h1>
      <p class="subtitle">Grid Trading Bot para GRVT</p>
    </header>

    <div class="status" id="statusCards">
      <div class="card">
        <h3>Estado</h3>
        <div class="value" id="status">--</div>
      </div>
      <div class="card">
        <h3>Grids Activos</h3>
        <div class="value" id="activeGrids">0</div>
      </div>
      <div class="card">
        <h3>Fills Totales</h3>
        <div class="value" id="totalFills">0</div>
      </div>
      <div class="card">
        <h3>PnL Total</h3>
        <div class="value" id="totalPnL">$0.00</div>
      </div>
    </div>

    <div class="section">
      <h2>📊 Grids Activos</h2>
      <div id="gridsList" class="grids-list">
        <div class="loading">Cargando grids...</div>
      </div>
    </div>

    <div class="section">
      <h2>⚙️ Controles</h2>
      <div class="button-group">
        <button onclick="refreshData()">🔄 Actualizar</button>
        <button onclick="openAPI()">📡 API</button>
      </div>
    </div>

    <footer>
      <p>GRVTBot Custom v1.0.0 | Dashboard en tiempo real</p>
      <p>Última actualización: <span id="lastUpdate">--:--:--</span></p>
    </footer>
  </div>

  <script>
    const API_BASE = 'http://' + window.location.host;

    async function loadData() {
      try {
        const [statusRes, gridsRes] = await Promise.all([
          fetch(API_BASE + '/api/status'),
          fetch(API_BASE + '/api/grids'),
        ]);

        if (!statusRes.ok || !gridsRes.ok) throw new Error('Error cargando datos');

        const status = await statusRes.json();
        const grids = await gridsRes.json();

        updateStatus(status);
        updateGrids(grids);
        updateTimestamp();
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('status').textContent = '❌ Error';
      }
    }

    function updateStatus(data) {
      document.getElementById('status').textContent = '✅ Activo';
      document.getElementById('activeGrids').textContent = data.activeGrids || 0;
      document.getElementById('totalFills').textContent = data.totalFills || 0;
      document.getElementById('totalPnL').textContent = '$' + ((data.totalPnL || 0).toFixed(2));
    }

    function updateGrids(grids) {
      const container = document.getElementById('gridsList');
      if (!grids || grids.length === 0) {
        container.innerHTML = '<div class="loading">No hay grids activos. Crea uno para comenzar.</div>';
        return;
      }

      container.innerHTML = grids.map(grid => `
        <div class="grid-item">
          <div class="grid-info">
            <div class="grid-name">${grid.instrument || 'N/A'}</div>
            <div class="grid-details">
              Precio: $${(grid.currentPrice || 0).toFixed(2)} |
              Fills: ${grid.fills || 0}
            </div>
          </div>
          <span class="badge ${grid.status === 'ACTIVE' ? 'active' : 'inactive'}">
            ${grid.status || 'INACTIVO'}
          </span>
        </div>
      `).join('');
    }

    function updateTimestamp() {
      const now = new Date();
      document.getElementById('lastUpdate').textContent = now.toLocaleTimeString();
    }

    function refreshData() {
      loadData();
    }

    function openAPI() {
      alert('API disponible en:\n\n/api/status\n/api/grids\n/api/account\n\nVe a http://' + window.location.host + '/api/status');
    }

    // Cargar datos iniciales
    loadData();

    // Actualizar cada 5 segundos
    setInterval(loadData, 5000);
  </script>
</body>
</html>
